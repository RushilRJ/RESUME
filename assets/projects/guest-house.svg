<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0c16"/>
      <stop offset="100%" stop-color="#161022"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <!-- Building silhouette -->
  <path d="M180 320 L180 180 L320 100 L460 180 L460 320 Z" fill="#1a1528" stroke="#7c3aed" stroke-width="2"/>
  <path d="M180 180 L320 100 L460 180" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <!-- Windows grid = database cells -->
  <g fill="#2a1f40" stroke="#6d28d9" stroke-width="1">
    <rect x="220" y="200" width="36" height="28" rx="2"/>
    <rect x="270" y="200" width="36" height="28" rx="2"/>
    <rect x="320" y="200" width="36" height="28" rx="2"/>
    <rect x="370" y="200" width="36" height="28" rx="2"/>
    <rect x="220" y="245" width="36" height="28" rx="2"/>
    <rect x="270" y="245" width="36" height="28" rx="2"/>
    <rect x="320" y="245" width="36" height="28" rx="2"/>
    <rect x="370" y="245" width="36" height="28" rx="2"/>
  </g>
  <rect x="290" y="285" width="60" height="35" rx="2" fill="#3b2060" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- Table icon -->
  <g transform="translate(480,90)" opacity="0.7">
    <rect x="0" y="20" width="90" height="12" rx="2" fill="#7c3aed"/>
    <rect x="8" y="40" width="74" height="8" rx="1" fill="#4c1d95"/>
    <rect x="8" y="54" width="74" height="8" rx="1" fill="#4c1d95"/>
    <rect x="8" y="68" width="74" height="8" rx="1" fill="#4c1d95"/>
  </g>
  <text x="40" y="48" font-family="Segoe UI, system-ui, sans-serif" font-size="14" fill="#a78bfa" letter-spacing="3" font-weight="600">DBMS · SQL · PYTHON</text>
  <text x="40" y="370" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#6b677a">Booking · Billing · Records</text>
</svg>
