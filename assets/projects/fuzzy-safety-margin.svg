<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#1a1028"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <g opacity="0.15" stroke="#a78bfa" stroke-width="1">
    <path d="M0 100 H640 M0 200 H640 M0 300 H640"/>
    <path d="M80 0 V400 M160 0 V400 M240 0 V400 M320 0 V400 M400 0 V400 M480 0 V400 M560 0 V400"/>
  </g>
  <!-- Degrading safety margin bands -->
  <path d="M40 320 C120 300 180 260 260 240 C340 220 400 180 480 160 C540 145 580 120 600 100"
        fill="none" stroke="url(#wave)" stroke-width="3" stroke-linecap="round"/>
  <path d="M40 340 C140 330 200 300 280 290 C360 280 420 250 500 240 C560 232 590 210 600 200"
        fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.5" stroke-dasharray="6 6"/>
  <path d="M40 280 C100 250 160 220 240 200 C320 180 400 140 500 120 C560 108 590 90 600 80"
        fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.4"/>
  <!-- Warning node -->
  <circle cx="480" cy="160" r="10" fill="#a78bfa" opacity="0.9"/>
  <circle cx="480" cy="160" r="18" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <circle cx="480" cy="160" r="28" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.25"/>
  <text x="40" y="48" font-family="Segoe UI, system-ui, sans-serif" font-size="14" fill="#a78bfa" letter-spacing="3" font-weight="600">FUZZY · CPS · EARLY WARNING</text>
  <text x="40" y="370" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#6b677a">IEEE WCCI 2026</text>
</svg>
