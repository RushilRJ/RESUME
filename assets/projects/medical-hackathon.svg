<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b12"/>
      <stop offset="100%" stop-color="#18102a"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <circle cx="320" cy="200" r="120" fill="url(#pulse)"/>
  <!-- Medical cross + circuit hybrid -->
  <rect x="290" y="140" width="60" height="120" rx="8" fill="#1e1830" stroke="#a78bfa" stroke-width="2"/>
  <rect x="250" y="180" width="140" height="60" rx="8" fill="#1e1830" stroke="#a78bfa" stroke-width="2"/>
  <rect x="302" y="155" width="36" height="90" rx="4" fill="#7c3aed" opacity="0.7"/>
  <rect x="265" y="194" width="110" height="32" rx="4" fill="#8b5cf6" opacity="0.55"/>
  <!-- ECG line -->
  <path d="M80 300 L160 300 L180 260 L200 340 L220 280 L240 300 L560 300"
        fill="none" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <text x="40" y="48" font-family="Segoe UI, system-ui, sans-serif" font-size="14" fill="#a78bfa" letter-spacing="3" font-weight="600">HACKATHON · HEALTHCARE</text>
  <text x="40" y="370" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#6b677a">VIT Bhopal · Top 50</text>
</svg>
